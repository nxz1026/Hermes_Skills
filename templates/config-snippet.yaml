# =============================================================================
# Hermes config.yaml — Provider 配置模板
# =============================================================================
# 本文件是 config.yaml 中 provider 相关字段的完整模板。
# 复制到 ~/.hermes/config.yaml 后，替换所有 <PLACEHOLDER> 值。
# API Key 统一通过环境变量注入，不直接写明文。
# =============================================================================

# ── 1. 主模型配置 (Top-level model) ─────────────────────────────────────────
# Hermes 使用此 provider 处理所有用户交互、推理和代码生成。
model:
  # 主模型显示名（必填）
  default: "LongCat-2.0-Preview"

  # Provider 名称：对应 custom_providers 中的 name（必填）
  provider: "Api.longcat.chat"

  # API base URL，末尾不含 /chat/completions（必填）
  base_url: "https://api.longcat.chat/openai"

  # API Key：通过环境变量注入，避免明文泄露（必填）
  api_key: "${LONGCAT_API_KEY}"

  # API 协议模式：openai 或 anthropic_messages（必填）
  api_mode: "openai"

  # 推理强度：low / medium / high（可选，默认 medium）
  reasoning_effort: "medium"

# ── 2. 自定义 Providers 数组 (custom_providers) ────────────────────────────
# 在此注册所有额外 provider。Hermes 通过 model.provider 字段引用这些名称。
custom_providers:
  # 2.1 LongCat 主模型 Provider
  #    用途：主对话、推理、代码生成
  - name: "Api.longcat.chat"
    base_url: "https://api.longcat.chat/openai"
    api_key: "${LONGCAT_API_KEY}"       # 从 ~/.hermes/.env 读取
    model: "LongCat-2.0-Preview"
    api_mode: "openai"

  # 2.2 OpenModel.ai Provider
  #    用途：备用/辅助模型，支持 deepseek 系列
  #    ⚠️ 踩坑：只支持 Anthropic Messages API (/v1/messages)
  #    不支持 OpenAI 协议 (/v1/chat/completions)
  #    Header 用 x-api-key（非 Authorization: Bearer）
  #    需带 anthropic-version: 2023-06-01
  - name: "Api.openmodel.ai"
    base_url: "https://api.openmodel.ai/v1"
    api_key: "${OPENMODEL_API_KEY}"      # 从 ~/.hermes/.env 读取
    model: "deepseek-v4-flash"
    api_mode: "anthropic_messages"        # ⚠️ 必须用此协议，否则 404

  # 2.3 讯飞云 Provider（可选）
  #    用途：备用推理通道
  - name: "xf-yun"
    base_url: "${XF_YUN_BASE_URL}"       # 从 ~/.hermes/.env 读取
    api_key: "${XUNFEI_API_KEY}"         # 从 ~/.hermes/.env 读取
    model: "xopqwen36v35b"
    api_mode: "openai"

# ── 3. Auxiliary Sub-task Providers ─────────────────────────────────────────
# Hermes 内部辅助任务使用的 provider 路由。
# 每个任务可以引用 custom_providers 中的 name，或内置 provider。
auxiliary:
  # 图像理解 / 视觉任务
  # 通过 NVIDIA NIM 代理 Kimi K2.6（支持多模态）
  vision:
    provider: "nvidia"
    api_key: "${NVIDIA_API_KEY}"
    model: "moonshotai/kimi-k2.6"

  # 网页内容提取
  # auto 模式：运行时自动选择最优 provider
  web_extract:
    provider: "auto"
    model: ""

  # 上下文压缩（长对话摘要/蒸馏）
  # 使用非 reasoning 模型以提高速度
  compression:
    provider: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-chat"

  # Skills Hub 技能市场 / 免费模型通道
  skills_hub:
    provider: "openrouter"
    api_key: "${OPENROUTER_API_KEY}"
    model: "openrouter/free"

  # 审批/校验任务（严格格式输出）
  approval:
    provider: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-chat"

  # MCP 工具调用辅助
  mcp:
    provider: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-chat"

  # 标题生成（轻量任务）
  title_generation:
    provider: "openrouter"
    api_key: "${OPENROUTER_API_KEY}"
    model: "openrouter/free"

  # TTS 音频标签生成
  tts_audio_tags:
    provider: "openrouter"
    api_key: "${OPENROUTER_API_KEY}"
    model: "openrouter/free"

  # 任务分类/分流
  triage_specifier:
    provider: "openrouter"
    api_key: "${OPENROUTER_API_KEY}"
    model: "openrouter/free"

  # 看板任务分解
  kanban_decomposer:
    provider: "openrouter"
    api_key: "${OPENROUTER_API_KEY}"
    model: "openrouter/free"

  # Profile 描述生成
  profile_describer:
    provider: "openrouter"
    api_key: "${OPENROUTER_API_KEY}"
    model: "openrouter/free"

  # Curator：自动知识蒸馏
  curator:
    provider: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-chat"

  # 监控任务（自动选择 provider）
  monitor:
    provider: "auto"
    model: ""

# ── 4. Memory 配置 ─────────────────────────────────────────────────────────
# Hermes 记忆系统配置。使用本地 mem0 集成（Qdrant 向量库）。
memory:
  # 记忆引擎：hermes-mem0-local（本地 Qdrant，不依赖外部 API）
  provider: "hermes-mem0-local"

  # 启用记忆存储
  memory_enabled: true

  # 启用用户画像
  user_profile_enabled: true

  # 记忆字符数上限（超出后触发压缩）
  memory_char_limit: 2200

  # 用户画像字符数上限
  user_char_limit: 1375

  # mem0 详细配置（对应 ~/.hermes/mem0/config.yaml）
  mem0:
    # LLM 提取配置
    llm:
      provider: "openai"
      model: "moonshotai/kimi-k2.6"
      api_key: "${NVIDIA_API_KEY}"              # 通过 NVIDIA NIM 代理
      openai_base_url: "https://integrate.api.nvidia.com/v1"
      temperature: 0.1
      max_tokens: 2000

    # Embedder 配置
    embedder:
      provider: "huggingface"
      model: "sentence-transformers/all-MiniLM-L6-v2"

    # 向量数据库配置
    vector_store:
      provider: "qdrant"
      path: "/root/.mem0/qdrant"
      embedding_model_dims: 384
      collection_name: "hermes_memories"
      on_disk: true

    # 历史记录存储（SQLite）
    history:
      path: "/root/.mem0/history.db"

    # 默认用户 ID
    defaults:
      user_id: "default_user"

# ── 5. Context Engine 配置 ─────────────────────────────────────────────────
context:
  # 上下文引擎：compressor（长对话自动压缩）
  engine: "compressor"

# ── 6. Compression 配置 ────────────────────────────────────────────────────
compression:
  # 启用自动压缩
  enabled: true
  # 压缩阈值（0.5 = 上下文窗口使用率达 50% 时触发）
  threshold: 0.5

# ── 7. Curator 配置 ────────────────────────────────────────────────────────
curator:
  # 启用自动知识蒸馏
  enabled: true
  # 蒸馏间隔（小时）：168 = 7 天
  interval_hours: 168

# ── 8. TTS 配置 ────────────────────────────────────────────────────────────
tts:
  provider: "edge"
  edge:
    voice: "en-US-AriaNeural"

# ── 9. Web / Search 配置 ───────────────────────────────────────────────────
web:
  backend: "tavily"

x_search:
  model: "grok-4.20-reasoning"

# ── 10. Image Generation 配置 ──────────────────────────────────────────────
image_gen:
  provider: "openai-codex"
  model: "gpt-image-2-medium"

# ── 11. STT 配置 ───────────────────────────────────────────────────────────
stt:
  enabled: true
  provider: "local"

# ── 12. Agent 运行时配置 ───────────────────────────────────────────────────
agent:
  # 最大对话轮次
  max_turns: 90
  # Gateway 超时（秒）
  gateway_timeout: 1800
  # 推理强度（传递给主模型）
  reasoning_effort: "medium"
